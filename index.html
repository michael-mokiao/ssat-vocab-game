<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>SSAT Vocabulary Challenge</title>
<meta name="description" content="A simple, colorful multiple-choice game to learn SSAT vocabulary words.">
<style>
  :root{
    --bg:#ffffff;
    --card:#ffffff;
    --card-border:#e4e8ee;
    --accent:#ffc233;
    --accent-text:#3a2c00;
    --accent2:#2fabd6;
    --good:#2ea94e;
    --bad:#e5484d;
    --text:#1c2530;
    --sub:#6b7684;
    --track:#eef1f5;
    --shadow: 0 4px 16px rgba(20,30,45,0.08);
    font-size: 16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x:hidden;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 18px;
  }
  .screen{
    width:100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 26px 22px 30px;
    position:relative;
    border: 1px solid var(--card-border);
  }
  h1.title{
    text-align:center;
    margin: 4px 0 2px;
    font-size: 1.9rem;
    letter-spacing: .5px;
  }
  h1.title span{ color: var(--accent2); }
  .subtitle{
    text-align:center;
    color: var(--sub);
    margin-bottom: 22px;
    font-size: .95rem;
  }
  .start-btn{
    display:block;
    width:100%;
    margin-top: 22px;
    padding: 16px;
    font-size: 1.2rem;
    font-weight:bold;
    letter-spacing: .5px;
    border:none;
    border-radius: 14px;
    background: var(--accent);
    color: var(--accent-text);
    cursor:pointer;
    box-shadow: 0 4px 0 #c99a1f;
    transition: transform .1s ease, box-shadow .1s ease;
  }
  .start-btn:active{
    transform: translateY(4px);
    box-shadow: 0 0 0 #c99a1f;
  }
  .hint{
    text-align:center;
    color: var(--sub);
    font-size: .75rem;
    margin-top: 14px;
  }

  /* ---- HUD ---- */
  .hud-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 10px; font-size: .85rem; color: var(--sub);
  }
  .hud-row b{ color: var(--text); }
  .score-pill{
    background: var(--track);
    color: var(--text);
    font-weight:bold;
    font-size: .85rem;
    padding: 4px 12px;
    border-radius: 999px;
  }

  .bar-track{
    height: 8px;
    width:100%;
    background: var(--track);
    border-radius: 6px;
    overflow:hidden;
    margin-bottom: 8px;
  }
  .bar-fill{
    height:100%;
    border-radius:6px;
    background: var(--accent2);
    transition: width .3s ease;
  }
  .timer-row{
    display:flex; align-items:center; gap:8px;
    margin-bottom: 18px;
  }
  .timer-row .bar-track{ flex:1; margin-bottom:0; }
  .timer-fill{
    height:100%;
    border-radius:6px;
    background: var(--good);
    transition: width 1s linear, background .3s ease;
  }
  .timer-num{
    font-size: .8rem;
    color: var(--sub);
    width: 22px;
    text-align:right;
  }

  /* ---- word card ---- */
  .word-card{
    background: var(--track);
    border-radius: 18px;
    padding: 26px 16px 24px;
    margin-bottom: 18px;
    text-align:center;
  }
  .word-label{ color: var(--sub); font-size: .75rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom: 8px; font-weight:bold; }
  .word-text{
    font-size: 2.2rem;
    font-weight:bold;
    color: var(--text);
  }

  /* ---- choices ---- */
  .choices{ display:flex; flex-direction:column; gap:10px; }
  .choice-btn{
    display:flex; align-items:flex-start; gap:12px;
    width:100%;
    text-align:left;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid var(--card-border);
    background: #ffffff;
    color: var(--text);
    font-family: inherit;
    font-size: .92rem;
    cursor:pointer;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .choice-btn:not(:disabled):hover{ border-color: var(--accent2); transform: translateY(-2px); }
  .choice-btn:not(:disabled):active{ transform: translateY(0); }
  .choice-letter{
    flex:none;
    width: 26px; height:26px;
    border-radius:50%;
    background: var(--track);
    border: 2px solid var(--card-border);
    display:flex; align-items:center; justify-content:center;
    font-size: .75rem; font-weight:bold; color: var(--sub);
  }
  .choice-btn.correct{ border-color: var(--good); background: #eafaf0; }
  .choice-btn.correct .choice-letter{ border-color: var(--good); color: var(--good); }
  .choice-btn.wrong{ border-color: var(--bad); background: #fdecec; }
  .choice-btn.wrong .choice-letter{ border-color: var(--bad); color: var(--bad); }
  .choice-btn.shake{ animation: shake .4s; }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    40%{ transform: translateX(6px); }
    60%{ transform: translateX(-4px); }
    80%{ transform: translateX(4px); }
  }

  /* ---- feedback ---- */
  .feedback{
    margin-top: 16px;
    border-radius: 16px;
    padding: 16px 18px;
    border: 2px solid var(--card-border);
    background: var(--track);
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(4px); } to{ opacity:1; transform: translateY(0); } }
  .feedback.correct{ border-color: var(--good); background: #eafaf0; }
  .feedback.wrong{ border-color: var(--bad); background: #fdecec; }
  .feedback-title{ font-weight:bold; margin-bottom: 6px; }
  .feedback.correct .feedback-title{ color: var(--good); }
  .feedback.wrong .feedback-title{ color: var(--bad); }
  .feedback-def{ font-size: .88rem; color: var(--text); margin: 0 0 4px; }
  .feedback-sentence{ font-size: .82rem; color: var(--sub); font-style: italic; margin:0; }
  .next-btn{
    display:block; width:100%; margin-top: 14px;
    padding: 14px; font-size: 1rem; font-weight:bold;
    border:none; border-radius: 12px; cursor:pointer;
    background: var(--accent); color: var(--accent-text);
    box-shadow: 0 4px 0 #c99a1f;
  }
  .next-btn:active{ transform: translateY(4px); box-shadow: 0 0 0 #c99a1f; }

  /* ---- end screen ---- */
  .end-wrap{ text-align:center; padding: 6px 0; }
  .end-score{
    font-size: 2.6rem;
    font-weight:bold;
    color: var(--accent2);
    margin: 4px 0 10px;
  }
  .end-message{
    color: var(--sub);
    font-size: .95rem;
    margin-bottom: 6px;
  }

  .hidden{ display:none !important; }

  @media (max-width: 400px){
    .word-text{ font-size: 1.8rem; }
    h1.title{ font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var WORDS = [
    {w:"Abate",d:"To become less intense or severe",s:"The storm's fury began to abate by midnight."},
    {w:"Benevolent",d:"Kind, generous, and caring toward others",s:"The benevolent king built hospitals for the poor."},
    {w:"Candid",d:"Honest and straightforward; not hiding one's thoughts",s:"She gave a candid answer about her mistakes."},
    {w:"Diligent",d:"Showing careful and persistent effort",s:"The diligent student studied every night."},
    {w:"Frugal",d:"Careful not to waste money or resources",s:"He was frugal, saving most of his paycheck."},
    {w:"Gregarious",d:"Fond of company; sociable",s:"The gregarious host loved throwing parties."},
    {w:"Tenacious",d:"Holding firmly to a purpose; persistent",s:"Her tenacious grip on the rope saved her life."},
    {w:"Opulent",d:"Luxurious and expensive-looking",s:"The opulent mansion had gold-trimmed ceilings."},
    {w:"Ambiguous",d:"Open to more than one interpretation; unclear",s:"His ambiguous answer left everyone confused."},
    {w:"Belligerent",d:"Hostile and aggressive",s:"The belligerent customer shouted at the clerk."},
    {w:"Concise",d:"Giving information clearly in few words",s:"Her concise summary saved everyone time."},
    {w:"Deceive",d:"To make someone believe something untrue",s:"He tried to deceive the judges with a fake story."},
    {w:"Eloquent",d:"Fluent and persuasive in speaking or writing",s:"The eloquent speaker moved the crowd to tears."},
    {w:"Fickle",d:"Changing frequently, especially in loyalty",s:"His fickle taste in music changed every week."},
    {w:"Gullible",d:"Easily tricked or deceived",s:"The gullible tourist bought a fake watch."},
    {w:"Hostile",d:"Unfriendly and aggressive",s:"The hostile crowd booed the referee."},
    {w:"Impartial",d:"Treating all sides equally; not biased",s:"The impartial judge listened to both sides fairly."},
    {w:"Jubilant",d:"Feeling or expressing great happiness",s:"The jubilant fans celebrated the championship win."},
    {w:"Lethargic",d:"Lacking energy; sluggish",s:"The lethargic dog barely lifted its head."},
    {w:"Meticulous",d:"Very careful and precise about details",s:"The meticulous editor checked every comma."},
    {w:"Novice",d:"A person new to a skill or activity",s:"As a novice cook, she burned the toast."},
    {w:"Obstinate",d:"Stubbornly refusing to change one's mind",s:"The obstinate child refused to eat vegetables."},
    {w:"Pragmatic",d:"Dealing with things in a sensible, practical way",s:"The pragmatic manager chose the cheaper, faster option."},
    {w:"Quell",d:"To put an end to; suppress",s:"The teacher's calm voice helped quell the panic."},
    {w:"Reticent",d:"Reluctant to speak openly",s:"He was reticent about his plans for the future."},
    {w:"Skeptical",d:"Having doubts; not easily convinced",s:"She remained skeptical of the salesman's claims."},
    {w:"Taciturn",d:"Saying very little; reserved in speech",s:"The taciturn stranger answered only in single words."},
    {w:"Ubiquitous",d:"Present or found everywhere",s:"Smartphones have become ubiquitous in modern life."},
    {w:"Vivacious",d:"Full of energy and enthusiasm",s:"The vivacious dancer lit up the stage."},
    {w:"Zealous",d:"Showing great energy and enthusiasm for a cause",s:"The zealous volunteers worked all weekend on the project."},
    {w:"Adversity",d:"Difficulty or hardship",s:"She overcame great adversity to become a doctor."},
    {w:"Brevity",d:"Shortness of time or expression",s:"The brevity of his speech impressed the audience."},
    {w:"Candor",d:"The quality of being open and honest",s:"I appreciated her candor when she admitted the error."},
    {w:"Diminish",d:"To make or become smaller or less",s:"The pain began to diminish after a few hours."},
    {w:"Empathy",d:"The ability to understand and share others' feelings",s:"Her empathy helped comfort her grieving friend."},
    {w:"Fortify",d:"To strengthen or protect",s:"They fortified the castle walls before the siege."},
    {w:"Hinder",d:"To create difficulty for; delay or obstruct",s:"Heavy rain hindered the rescue efforts."},
    {w:"Innate",d:"Existing from birth; natural rather than learned",s:"She has an innate talent for music."},
    {w:"Jargon",d:"Special words or phrases used by a particular profession",s:"The doctor's jargon confused the new patients."},
    {w:"Kindle",d:"To start a fire or arouse a feeling",s:"The story helped kindle her interest in history."},
    {w:"Lucid",d:"Clear and easy to understand",s:"His lucid explanation made the topic simple."},
    {w:"Malice",d:"A desire to harm others",s:"There was no malice in his harmless prank."},
    {w:"Naive",d:"Showing a lack of experience or judgment",s:"It was naive of him to trust a stranger with his savings."},
    {w:"Ominous",d:"Suggesting that something bad is going to happen",s:"Dark, ominous clouds gathered over the field."},
    {w:"Placid",d:"Calm and peaceful, without much disturbance",s:"The lake was placid on that quiet morning."},
    {w:"Query",d:"A question, especially one expressing doubt",s:"The librarian answered every query patiently."},
    {w:"Rigid",d:"Stiff and inflexible",s:"The rigid metal rod would not bend."},
    {w:"Sparse",d:"Thinly spread or scattered; not dense",s:"The desert had only sparse vegetation."},
    {w:"Trivial",d:"Of little importance or value",s:"They argued over a trivial detail."},
    {w:"Vindicate",d:"To clear someone of blame or suspicion",s:"New evidence helped vindicate the accused man."}
  ];

  var NUM_QUESTIONS = 10;
  var SEC_PER_Q = 30;
  var LETTERS = ["A","B","C","D"];

  var app = document.getElementById('app');
  var state = { pool:[], idx:0, score:0, timer:null, timeLeft:SEC_PER_Q, answered:false, correctIdx:0 };

  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = randInt(0,i);
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  // ---------------- Screen mounting ----------------
  function mount(buildFn){
    app.innerHTML = '';
    var el = buildFn();
    el.classList.add('screen');
    app.appendChild(el);
  }

  // ---------------- START SCREEN ----------------
  function StartScreen(){
    var el = document.createElement('div');
    el.innerHTML =
      '<h1 class="title">📚 SSAT <span>Vocabulary</span></h1>' +
      '<p class="subtitle">' + NUM_QUESTIONS + ' random words &middot; 4 choices each &middot; ' + SEC_PER_Q + 's per question</p>' +
      '<button class="start-btn" id="startBtn">Start Game</button>' +
      '<p class="hint">50-word SSAT bank &middot; new random set every round</p>';
    el.querySelector('#startBtn').addEventListener('click', startGame);
    return el;
  }

  // ---------------- QUIZ SCREEN ----------------
  var quizRefs = {};

  function QuizScreen(){
    var el = document.createElement('div');
    el.innerHTML =
      '<div class="hud-row">' +
        '<span>Question <b id="qNum">1</b> / ' + NUM_QUESTIONS + '</span>' +
        '<span class="score-pill">⭐ <span id="scoreVal">0</span></span>' +
      '</div>' +
      '<div class="bar-track"><div class="bar-fill" id="progressFill" style="width:0%"></div></div>' +
      '<div class="timer-row">' +
        '<span>⏱</span>' +
        '<div class="bar-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>' +
        '<span class="timer-num" id="timerNum">' + SEC_PER_Q + '</span>' +
      '</div>' +
      '<div class="word-card">' +
        '<div class="word-label">Target Word</div>' +
        '<div class="word-text" id="targetWord">Word</div>' +
      '</div>' +
      '<div class="choices" id="choices"></div>' +
      '<div class="feedback hidden" id="feedback">' +
        '<div class="feedback-title" id="feedbackTitle"></div>' +
        '<p class="feedback-def" id="feedbackDef"></p>' +
        '<p class="feedback-sentence" id="feedbackSentence"></p>' +
        '<button class="next-btn" id="nextBtn">Next Question</button>' +
      '</div>';

    quizRefs = {
      qNum: el.querySelector('#qNum'),
      scoreVal: el.querySelector('#scoreVal'),
      progressFill: el.querySelector('#progressFill'),
      timerFill: el.querySelector('#timerFill'),
      timerNum: el.querySelector('#timerNum'),
      targetWord: el.querySelector('#targetWord'),
      choices: el.querySelector('#choices'),
      feedback: el.querySelector('#feedback'),
      feedbackTitle: el.querySelector('#feedbackTitle'),
      feedbackDef: el.querySelector('#feedbackDef'),
      feedbackSentence: el.querySelector('#feedbackSentence'),
      nextBtn: el.querySelector('#nextBtn')
    };

    quizRefs.nextBtn.addEventListener('click', nextQuestion);

    return el;
  }

  function loadQuestion(){
    state.answered = false;
    var item = state.pool[state.idx];
    quizRefs.qNum.textContent = String(state.idx+1);
    quizRefs.progressFill.style.width = (state.idx/NUM_QUESTIONS*100)+'%';
    quizRefs.targetWord.textContent = item.w;
    quizRefs.feedback.classList.add('hidden');

    var others = shuffle(WORDS.filter(function(x){ return x.w!==item.w; })).slice(0,3);
    var options = shuffle([{d:item.d,correct:true}].concat(others.map(function(o){ return {d:o.d,correct:false}; })));
    state.correctIdx = options.findIndex(function(o){ return o.correct; });

    var html = '';
    for(var i=0;i<options.length;i++){
      html += '<button class="choice-btn" data-idx="'+i+'">' +
        '<span class="choice-letter">'+LETTERS[i]+'</span>' +
        '<span>'+options[i].d+'</span></button>';
    }
    quizRefs.choices.innerHTML = html;
    var btns = quizRefs.choices.querySelectorAll('.choice-btn');
    btns.forEach(function(btn){
      btn.addEventListener('click', function(){
        selectAnswer(parseInt(btn.dataset.idx,10));
      });
    });

    clearInterval(state.timer);
    state.timeLeft = SEC_PER_Q;
    quizRefs.timerNum.textContent = String(SEC_PER_Q);
    quizRefs.timerFill.style.width = '100%';
    quizRefs.timerFill.style.background = '';
    state.timer = setInterval(function(){
      state.timeLeft--;
      quizRefs.timerNum.textContent = String(state.timeLeft);
      quizRefs.timerFill.style.width = (state.timeLeft/SEC_PER_Q*100)+'%';
      if(state.timeLeft <= 10){ quizRefs.timerFill.style.background = 'var(--bad)'; }
      if(state.timeLeft <= 0){
        clearInterval(state.timer);
        selectAnswer(-1);
      }
    }, 1000);
  }

  function selectAnswer(chosenIdx){
    if(state.answered) return;
    state.answered = true;
    clearInterval(state.timer);
    var item = state.pool[state.idx];
    var btns = quizRefs.choices.querySelectorAll('.choice-btn');
    var isCorrect = chosenIdx === state.correctIdx;

    btns.forEach(function(btn,i){
      btn.disabled = true;
      if(i === state.correctIdx){
        btn.classList.add('correct');
      } else if(i === chosenIdx){
        btn.classList.add('wrong','shake');
      }
    });

    if(isCorrect){
      state.score++;
      quizRefs.scoreVal.textContent = String(state.score);
    }

    var fb = quizRefs.feedback;
    fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
    quizRefs.feedbackTitle.textContent = chosenIdx === -1
      ? "Time's up! The answer was:"
      : (isCorrect ? 'Correct! Nice work.' : 'Not quite.');
    quizRefs.feedbackDef.textContent = item.w + ' means: ' + item.d + '.';
    quizRefs.feedbackSentence.textContent = item.s;
    quizRefs.nextBtn.textContent = state.idx === NUM_QUESTIONS-1 ? 'See Results' : 'Next Question';
    fb.classList.remove('hidden');
    quizRefs.progressFill.style.width = ((state.idx+1)/NUM_QUESTIONS*100)+'%';
  }

  function nextQuestion(){
    state.idx++;
    if(state.idx >= NUM_QUESTIONS){ showEnd(); }
    else { loadQuestion(); }
  }

  // ---------------- END SCREEN ----------------
  function EndScreen(){
    var el = document.createElement('div');
    var msg;
    if(state.score >= 9) msg = "Perfect score! You're a vocabulary superstar.";
    else if(state.score >= 7) msg = 'Excellent work! You really know your words.';
    else if(state.score >= 5) msg = 'Good job! Keep practicing to master a few more.';
    else msg = 'Nice effort! Review the words and try again.';

    el.innerHTML =
      '<div class="end-wrap">' +
        '<h1 class="title">Results</h1>' +
        '<div class="end-score">' + state.score + ' / ' + NUM_QUESTIONS + '</div>' +
        '<p class="end-message">' + msg + '</p>' +
        '<button class="start-btn" id="againBtn">Play Again</button>' +
      '</div>';
    el.querySelector('#againBtn').addEventListener('click', startGame);
    return el;
  }

  function showEnd(){
    mount(EndScreen);
  }

  function startGame(){
    state.pool = shuffle(WORDS).slice(0, NUM_QUESTIONS);
    state.idx = 0;
    state.score = 0;
    mount(QuizScreen);
    loadQuestion();
  }

  // ---------------- Init ----------------
  mount(StartScreen);

})();
</script>
</body>
</html>
